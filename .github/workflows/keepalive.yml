name: keepalive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error --max-time 20 --retry 2 --retry-delay 5 https://javastreams.onrender.com/api/health
