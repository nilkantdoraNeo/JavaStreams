name: keepalive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error --max-time 120 --retry 6 --retry-delay 10 --retry-all-errors https://javastreams.onrender.com/api/health
